  /* ColVis (column-visibility) dropdown: opaque panel so it doesn't
     bleed into the table underneath */

    background:var(--bulma-scheme-main);
    border:1px solid var(--bulma-border);
    border-radius:6px;
    box-shadow:0 8px 24px rgba(0,0,0,.35);
    padding:.4rem;
    z-index:2001;
    display:flex;
    flex-direction:column;
  }
  .dt-button-collection .dt-button{
    display:block;
    width:100%;
    text-align:left;
    margin:0;
    background:transparent;
    color:var(--bulma-text);
  }
  .dt-button-collection .dt-button:hover{ background:var(--bulma-scheme-main-bis); }
  .dt-button-collection .dt-button.active{ background:var(--bulma-primary,#485fc7); color:#fff; }
  /* dim the page behind an open collection */

  /* record modal: one block per record in the ancestry chain */

  .rec-head{ display:flex; align-items:center; gap:.5rem; margin-bottom:.5rem; }

                  font-weight:600; padding:.15rem .5rem .15rem 0; white-space:nowrap; }
  .rec-fields td{ vertical-align:top; padding:.15rem 0; word-break:break-word; }

<!-- set the Bulma theme before paint (saved choice, else OS preference) -->
<script>
  (function(){
    var t;
    try{ t = localStorage.getItem('jtd-theme'); }catch(e){}
    if(t!=='light' && t!=='dark'){
      t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
    }
    document.documentElement.setAttribute('data-theme', t);
  })();
</script>

<!-- RECORD MODAL: a record's ancestry chain (self → parent → … → root),
     each a link to that record's table filtered to just that record -->
<div class="modal" id="recModal">
  <div class="modal-background" data-close="1"></div>
  <div class="modal-card">
    <header class="modal-card-head">

<!-- jQuery + DataTables(bulma) + SearchBuilder -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/v/bm/dt-2.3.8/date-1.6.3/sb-1.8.4/datatables.min.js" integrity="sha384-S4e+nR35BknwgRkxiQsGx2hSk7siXmCvuj/Q7XnL11uUFgcFvE0NHHPGiDXU05Sj" crossorigin="anonymous"></script>
<script src="https://cdn.datatables.net/buttons/3.2.0/js/dataTables.buttons.min.js"></script>
<script src="https://cdn.datatables.net/buttons/3.2.0/js/buttons.colVis.min.js"></script>

<script>
/* =====================================================================
 * MODEL — identical nested-JSON flattening to the main app.
 * ===================================================================== */
const DEFAULT_ID_KEYS   = ["id"];
const DEFAULT_NAME_KEYS = ["name"];
const pick = (o,ks)=>{ for(const k of ks){ if(o[k]!=null && o[k]!=="") return o[k]; } return null; };
const getId   = (o,i,idKeys)=>{ const v=pick(o,idKeys);   return v!=null?v:("#"+i); };
const getName = (o,i,nameKeys,idKeys)=>{ const v=pick(o,nameKeys); if(v!=null) return String(v); const d=pick(o,idKeys); return d!=null?String(d):("row "+(i+1)); };
const isObjArray = v => Array.isArray(v) && v.some(x=>x && typeof x==="object" && !Array.isArray(x));

function buildTables(rootData, rootName, keys){
  const idKeys   = (keys && keys.idKeys   && keys.idKeys.length)   ? keys.idKeys   : DEFAULT_ID_KEYS;
  const nameKeys = (keys && keys.nameKeys && keys.nameKeys.length) ? keys.nameKeys : DEFAULT_NAME_KEYS;
  const tables={}, order=[]; let seq=0;
  const ensure=n=>{ if(!tables[n]){tables[n]={name:n, rows:[]}; order.push(n);} return tables[n]; };
  function walk(arr, tableName, ancestors){
    const t=ensure(tableName);
    arr.forEach((item,idx)=>{
      if(item===null || typeof item!=="object" || Array.isArray(item)){
        t.rows.push({__anc:ancestors.slice(), __id:idx, __name:String(item), cells:{value:item}, links:{}});
        return;
      }
      const id=getId(item,idx,idKeys), name=getName(item,idx,nameKeys,idKeys);
      // the actual key that supplied the id (e.g. "id"), so a record can later be
      // filtered to itself by its own id column; null when only the index fallback exists
      const idKey=idKeys.find(k=>item[k]!=null && item[k]!=="") || null;
      const row={__anc:ancestors.slice(), __id:id, __name:name, __idKey:idKey, cells:{}, links:{}};
      for(const [k,v] of Object.entries(item)){
        if(isObjArray(v)){
          row.links[k]=v.length;
          walk(v.filter(x=>x && typeof x==="object" && !Array.isArray(x)), k, ancestors.concat([{table:tableName,id,name,idKey}]));
        } else if(Array.isArray(v)) row.cells[k]=v.join(", ");
        else if(v && typeof v==="object") row.cells[k]=JSON.stringify(v);
        else row.cells[k]=v;
      }
      t.rows.push(row);
    });
  }
  const arr = Array.isArray(rootData) ? rootData
            : (rootData && typeof rootData==="object") ? [rootData] : [rootData];
  walk(arr, rootName, []);
  return {tables, order, idKeys, nameKeys};
}
function computeColumns(table){
  const anc=[],sca=[],lnk=[], sa=new Set(),ss=new Set(),sl=new Set();
  for(const r of table.rows){
    for(const a of r.__anc) if(!sa.has(a.table)){sa.add(a.table); anc.push(a.table);}
    for(const k of Object.keys(r.cells)) if(!ss.has(k)){ss.add(k); sca.push(k);}
    for(const k of Object.keys(r.links)) if(!sl.has(k)){sl.add(k); lnk.push(k);}
  }
  return {anc, sca, lnk};
}
const ancGet   = (table)=> (r)=>{ const a=r.__anc.find(x=>x.table===table); return a?a.name:null; };
const ancIdGet = (table)=> (r)=>{ const a=r.__anc.find(x=>x.table===table); return a?a.id:null; };

/* =====================================================================
 * DataTables rendering
 * ===================================================================== */
const ROOTNAME='root';
let MODEL=null, currentTable=null, dt=null, parseTimer=null;

/* ---------------------------------------------------------------------
 * Column-visibility persistence, per table ("category").
 * Keyed by table name; stores a signature of the current column set so
 * the saved choice is discarded automatically when the columns change.
 * ------------------------------------------------------------------- */
const COLVIS_KEY='jtd-colvis';
// suppress persistence while a table is being torn down: dt.destroy() re-shows
// hidden columns (firing column-visibility), which would otherwise clobber the
// saved state with "nothing hidden".
let suppressColVisSave=false;
function loadColVis(){ try{ return JSON.parse(localStorage.getItem(COLVIS_KEY))||{}; }catch(_){ return {}; } }
function saveColVis(store){ try{ localStorage.setItem(COLVIS_KEY, JSON.stringify(store)); }catch(_){} }
const colSig = titles => titles.join('');
function rememberColVis(tableName, titles){
  if(suppressColVisSave) return;
  const store=loadColVis();
  const hidden=[];
  dt.columns().every(function(i){ if(!this.visible()) hidden.push(titles[i]); });
  store[tableName]={ sig:colSig(titles), hidden };
  saveColVis(store);
}
function applyColVis(tableName, titles){
  const saved=loadColVis()[tableName];
  if(!saved || saved.sig!==colSig(titles)) return;      // categories changed → ignore
  const hide=new Set(saved.hidden);
  if(!hide.size) return;                                  // nothing hidden
  titles.forEach((t,i)=>{ dt.column(i).visible(!hide.has(t), false); });  // batch, no redraw
  dt.columns.adjust().draw(false);
}

function esc(s){ if(s==null) return ''; return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
const cellRender = (d,type)=> type==='display' ? '<div class="cell">'+esc(d)+'</div>' : d;

function buildTabs(){
  const el=document.getElementById('tabs'); el.innerHTML='';
  MODEL.order.forEach(name=>{
    const b=document.createElement('button');
    b.type='button';
    b.className='button is-small'+(name===currentTable?' is-dark':'');
    b.innerHTML=esc(name)+' <span class="ml-1 has-text-grey">('+MODEL.tables[name].rows.length+')</span>';
    b.onclick=()=>render(name);
    el.appendChild(b);
  });
}

function render(tableName, filter){
  currentTable=tableName;
  buildTabs();
  const t=MODEL.tables[tableName];
  const {anc, sca, lnk}=computeColumns(t);

  const columns=[], getters=[];
  anc.forEach(a=>{
    const g=ancGet(a), gid=ancIdGet(a);
    // ancestor name column: link to that ancestor's own record modal
    columns.push({title:a+' ↑', render:(d,type,rowArr,meta)=>{
      if(type!=='display') return d==null?'':d;
      if(d==null || d==='') return '<div class="cell"></div>';
      return '<div class="cell"><a href="#" class="anclnk" data-ridx="'+meta.row+'" data-anc="'+esc(a)+'">'+esc(d)+'</a></div>';
    }}); getters.push(r=>g(r));
    columns.push({title:a+'_id', type:'string', render:cellRender}); getters.push(r=>{ const v=gid(r); return v==null?'':String(v); });
  });
  const nameSet=new Set(MODEL.nameKeys||[]);
  sca.forEach(k=>{
    if(nameSet.has(k)){
      // name-key column: link each value to the record's ancestry modal
      columns.push({title:k, render:(d,type,rowArr,meta)=>{
        if(type!=='display') return d==null?'':d;
        if(d==null || d==='') return '<div class="cell"></div>';
        return '<div class="cell"><a href="#" class="namelnk" data-ridx="'+meta.row+'">'+esc(d)+'</a></div>';
      }});
    } else {
      columns.push({title:k, render:cellRender});
    }
    getters.push(r=>r.cells[k]);
  });
  lnk.forEach(k=>{
    columns.push({ title:k, render:(d,type,rowArr,meta)=>{
      if(type!=='display') return d;
      if(!(Number(d)>0)) return '<span class="muted">0</span>';
      const parent=t.rows[meta.row];
      // full ancestry of the clicked parent: every ancestor id + the parent's own id
      const fc=parent.__anc.map(a=>({col:a.table+'_id', value:String(a.id)}));
      fc.push({col:tableName+'_id', value:String(parent.__id)});
      return '<a href="#" class="lnk" data-goto="'+esc(k)+'" data-filter="'+esc(JSON.stringify(fc))+'">'+esc(d)+'</a>';
    }});
    getters.push(r=>r.links[k]||0);
  });

  const data=t.rows.map(r=> getters.map(g=>{ const v=g(r); return v==null?'':v; }));

  // when arriving via a parent's link, pre-fill SearchBuilder with the clicked
  // parent's FULL ancestry (every "<table>_id"), so cousins are excluded and the
  // data is filtered correctly regardless of what was filtered before.
  const colTitles=columns.map(c=>c.title);
  const sb={}, crit=[], titles=new Set(colTitles);
  if(filter && filter.crit){
    // arriving via a parent's link: pre-fill with the clicked parent's ancestry.
    // (Switching tables via the tabs passes no filter, so filters reset there.)
    filter.crit.forEach(c=>{ if(titles.has(c.col)) crit.push({ data:c.col, origData:c.col, condition:'=', value:[c.value] }); });
    if(crit.length) sb.preDefined={ logic:'AND', criteria:crit };
  }

  if(dt){ suppressColVisSave=true; dt.destroy(); suppressColVisSave=false; document.getElementById('grid').innerHTML=''; }
  dt=new DataTable('#grid', {
    data, columns,
    order: [],
    scrollX: true,
    pageLength: 30,
    lengthMenu: [10,20,30,40,50,100],
    layout: {
      top1:       { searchBuilder: sb },
      topStart:   { pageLength: {}, buttons: ['colvis'] },
      topEnd:     'search',
      bottomStart:'info',
      bottomEnd:  'paging'
    }
  });

  // restore this table's saved column visibility (if its columns are unchanged),
  // then persist any further toggles the user makes.
  applyColVis(tableName, colTitles);
  dt.on('column-visibility.dt', ()=> rememberColVis(tableName, colTitles));
}

function applyCellHeight(){
  const v=parseInt(document.getElementById('cellheight').value,10);
  document.documentElement.style.setProperty('--cellh', v>0 ? v+'px' : 'none');
}

function parse(){
  const err=document.getElementById('error');
  const raw=document.getElementById('json').value.trim();
  if(!raw){ err.textContent='Paste JSON to begin.'; return; }
  let data; try{ data=JSON.parse(raw); } catch(e){ err.textContent='Invalid JSON: '+e.message; return; }
  const parseKeys=s=> s.split(/[\s,]+/).map(x=>x.trim()).filter(Boolean);
  const idKeys=parseKeys(document.getElementById('idkeys').value);
  const nameKeys=parseKeys(document.getElementById('namekeys').value);
  const m=buildTables(data, ROOTNAME, {idKeys, nameKeys});
  if(!m.order.length){ err.textContent='No tabular data found.'; return; }
  err.textContent='';
  MODEL=m;
  const tbl=(currentTable && m.tables[currentTable]) ? currentTable : m.order[0];
  render(tbl);
}
const scheduleParse=()=>{ clearTimeout(parseTimer); parseTimer=setTimeout(parse, 400); };

/* clicking a link-count cell jumps to that child table, filtered to the clicked
   parent's full ancestor-id chain (embedded on the link). */
$(document).on('click', 'a.lnk', function(e){ e.preventDefault();
  let crit=[];
  try{ crit=JSON.parse(this.getAttribute('data-filter'))||[]; }catch(_){}
  render(this.getAttribute('data-goto'), { crit });
});

/* =====================================================================
 * Record modal — clicking a name shows the record's ancestry chain
 * (self → parent → … → root). Each record lists all of its field values
 * and links to its own table, filtered to just that record.
 * ===================================================================== */
function critForNode(nodes, i){
  // ancestor-id columns for everything above node i, plus node i's own id column
  const crit=nodes.slice(0,i).map(a=>({ col:a.table+'_id', value:String(a.id) }));
  const n=nodes[i];
  if(n.idKey!=null) crit.push({ col:n.idKey, value:n.id });
  return crit;
}
/* find a node's full record (with all its cells) in its own table, matched by
   its id and its exact ancestor chain so same-id cousins aren't confused */
function findNodeRow(nodes, i){
  const table=MODEL && MODEL.tables[nodes[i].table];
  if(!table) return null;
  const id=nodes[i].id, prefix=nodes.slice(0,i);
  return table.rows.find(r=>{
    if(r.__id!==id || r.__anc.length!==prefix.length) return false;
    for(let j=0;j<prefix.length;j++){ if(r.__anc[j].table!==prefix[j].table || r.__anc[j].id!==prefix[j].id) return false; }
    return true;
  }) || null;
}
/* filter that selects a record's children: the record's full ancestry + its own
   id (expressed as "<recordTable>_id"), matching the main table's count links */
function childCrit(row, table){
  const fc=row.__anc.map(a=>({ col:a.table+'_id', value:String(a.id) }));
  fc.push({ col:table+'_id', value:String(row.__id) });
  return fc;
}
function fieldsTable(row, table){
  const rows=Object.entries(row.cells).map(([k,v])=>
    '<tr><th>'+esc(k)+'</th><td>'+(v==null||v===''?'<span class="muted">—</span>':esc(v))+'</td></tr>').join('');
  // child collections (link counts) become drill-down links, like the table cells
  const crit=esc(JSON.stringify(childCrit(row, table)));
  const links=Object.entries(row.links).map(([k,n])=>{
    const val=Number(n)>0
      ? '<a href="#" class="childlnk" data-goto="'+esc(k)+'" data-filter="'+crit+'">'+esc(n)+'</a>'
      : '<span class="muted">'+esc(n)+'</span>';
    return '<tr><th>'+esc(k)+'</th><td>'+val+'</td></tr>';
  }).join('');
  return '<table class="rec-fields">'+rows+links+'</table>';
}
function openRecordModal(row, table){
  // root → self, so nodes[last] is the record itself
  table=table||currentTable;
  const nodes=row.__anc.concat([{ table, id:row.__id, name:row.__name, idKey:row.__idKey }]);
  document.getElementById('recModalTitle').textContent=row.__name;
  const body=document.getElementById('recModalBody');
  body.innerHTML='';
  for(let i=nodes.length-1;i>=0;i--){           // self first, then up to root
    const n=nodes[i], crit=critForNode(nodes,i);
    const rec=(i===nodes.length-1) ? row : findNodeRow(nodes,i);
    const div=document.createElement('div');
    div.className='rec-node';
    const head=document.createElement('a');
    head.href='#'; head.className='rec-head';
    head.innerHTML='<span class="tag is-info is-light lvl">'+esc(n.table)+'</span>'
                 + '<span class="nm">'+esc(n.name)+'</span>';
    head.addEventListener('click', ev=>{ ev.preventDefault(); closeRecModal(); render(n.table, { crit }); });
    div.appendChild(head);
    div.insertAdjacentHTML('beforeend', rec ? fieldsTable(rec, n.table) : '<p class="muted">(record not found)</p>');
    body.appendChild(div);
  }
  document.getElementById('recModal').classList.add('is-active');
}
function closeRecModal(){ document.getElementById('recModal').classList.remove('is-active'); }

/* clicking a name opens that record's modal */
$(document).on('click', 'a.namelnk', function(e){ e.preventDefault();
  const ridx=+this.getAttribute('data-ridx');
  const row=MODEL && MODEL.tables[currentTable] && MODEL.tables[currentTable].rows[ridx];
  if(row) openRecordModal(row);
});
/* clicking an ancestor name opens THAT ancestor record's modal (e.g. the root or
   season of an episode) — showing just that record and its own ancestry. */
$(document).on('click', 'a.anclnk', function(e){ e.preventDefault();
  const ridx=+this.getAttribute('data-ridx'), ancTable=this.getAttribute('data-anc');
  const row=MODEL && MODEL.tables[currentTable] && MODEL.tables[currentTable].rows[ridx];
  if(!row) return;
  const k=row.__anc.findIndex(x=>x.table===ancTable);
  if(k<0) return;
  const ancRow=findNodeRow(row.__anc.slice(0,k+1), k);   // the ancestor's full record
  if(ancRow) openRecordModal(ancRow, ancTable);
});
/* clicking a child-collection count inside the modal drills into that child
   table, filtered to the record whose modal is open */
$(document).on('click', 'a.childlnk', function(e){ e.preventDefault();
  let crit=[]; try{ crit=JSON.parse(this.getAttribute('data-filter'))||[]; }catch(_){}
  closeRecModal();
  render(this.getAttribute('data-goto'), { crit });
});
/* modal close: background, delete button, or Esc */
document.querySelectorAll('#recModal [data-close]').forEach(el=> el.addEventListener('click', closeRecModal));
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeRecModal(); });

/* header button opens/closes the sidebar */
document.getElementById('sidebarToggle').addEventListener('click', ()=>{
  document.querySelector('.app-body').classList.toggle('is-collapsed');
  if(dt) dt.columns.adjust();
});

/* light/dark toggle — Bulma data-theme, persisted to localStorage */
function setTheme(t){
  document.documentElement.setAttribute('data-theme', t);
  try{ localStorage.setItem('jtd-theme', t); }catch(_){}
  document.getElementById('themeIcon').textContent = t==='dark' ? '☀️' : '🌙';
}
document.getElementById('themeToggle').addEventListener('click', ()=>{
  setTheme(document.documentElement.getAttribute('data-theme')==='dark' ? 'light' : 'dark');
});
setTheme(document.documentElement.getAttribute('data-theme')==='dark' ? 'dark' : 'light'); // sync icon

/* persist the input fields (JSON + ID/Name keys + cell height) so a reload
   restores what the user was working on instead of resetting to defaults */
const INPUT_KEY='jtd-inputs';
const INPUT_IDS=['json','idkeys','namekeys','cellheight'];
function saveInputs(){
  try{
    const o={}; INPUT_IDS.forEach(id=> o[id]=document.getElementById(id).value);
    localStorage.setItem(INPUT_KEY, JSON.stringify(o));
  }catch(_){}
}
function loadInputs(){ try{ return JSON.parse(localStorage.getItem(INPUT_KEY))||null; }catch(_){ return null; } }

['json','idkeys','namekeys'].forEach(id=> document.getElementById(id).addEventListener('input', scheduleParse));
document.getElementById('cellheight').addEventListener('input', applyCellHeight);
INPUT_IDS.forEach(id=> document.getElementById(id).addEventListener('input', saveInputs));
document.getElementById('loadSample').addEventListener('click', loadSampleIntoInput);

/* =====================================================================
 * sample data — loaded from sample.json
 * ===================================================================== */
let SAMPLE=null;
function loadSampleIntoInput(){
  if(!SAMPLE) return;
  document.getElementById('json').value=JSON.stringify(SAMPLE,null,2);
  saveInputs();
  parse();
}

/* boot */
applyCellHeight();
// restore saved inputs; only fall back to the bundled sample if there's none
const savedInputs=loadInputs();
if(savedInputs){
  INPUT_IDS.forEach(id=>{ if(savedInputs[id]!=null) document.getElementById(id).value=savedInputs[id]; });
  applyCellHeight();
}
const hasSavedJson=!!document.getElementById('json').value.trim();
if(hasSavedJson) parse();

fetch('sample.json')
  .then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
  .then(data=>{ SAMPLE=data; if(!hasSavedJson) loadSampleIntoInput(); })
  .catch(e=>{ if(!hasSavedJson) document.getElementById('error').textContent='Could not load sample.json ('+e.message+'). Paste JSON to begin.'; });
</script>
