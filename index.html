function hexToHsl(hex){
  let h=hex.replace('#',''); if(h.length===3) h=h.split('').map(c=>c+c).join('');
  const r=parseInt(h.slice(0,2),16)/255, g=parseInt(h.slice(2,4),16)/255, b=parseInt(h.slice(4,6),16)/255;
  const max=Math.max(r,g,b), min=Math.min(r,g,b), l=(max+min)/2, d=max-min; let hue=0,s=0;
  if(d!==0){
    s=l>0.5? d/(2-max-min) : d/(max+min);
    if(max===r) hue=(g-b)/d+(g<b?6:0); else if(max===g) hue=(b-r)/d+2; else hue=(r-g)/d+4;
    hue/=6;
  }
  return (hue*360).toFixed(1)+' '+(s*100).toFixed(1)+'% '+(l*100).toFixed(1)+'%';
}
function fgForHex(hex){
  let h=hex.replace('#',''); if(h.length===3) h=h.split('').map(c=>c+c).join('');
  const r=parseInt(h.slice(0,2),16), g=parseInt(h.slice(2,4),16), b=parseInt(h.slice(4,6),16);
  return (0.299*r+0.587*g+0.114*b)>150 ? '222.2 47.4% 11.2%' : '210 40% 98%';
}

/* =====================================================================
 * MODEL — flatten arbitrary JSON into related tables.
 * Every nested array-of-objects under key K (anywhere) accumulates into
 * one table K. Each child row remembers its ancestor chain so we can show
 * parent-name columns and pre-filter on the parent id when drilling in.
 * ===================================================================== */
// Which keys, in order, mark a row's id / display name. First match found wins.
// These are the defaults; they can be overridden from the config below the JSON input.
const DEFAULT_ID_KEYS   = ["id"];
const DEFAULT_NAME_KEYS = ["name"];
const pick = (o,ks)=>{ for(const k of ks){ if(o[k]!=null && o[k]!=="") return o[k]; } return null; };
const getId   = (o,i,idKeys)=>{ const v=pick(o,idKeys);   return v!=null?v:("#"+i); };
const getName = (o,i,nameKeys,idKeys)=>{ const v=pick(o,nameKeys); if(v!=null) return String(v); const d=pick(o,idKeys); return d!=null?String(d):("row "+(i+1)); };
const isObjArray = v => Array.isArray(v) && v.some(x=>x && typeof x==="object" && !Array.isArray(x));

function buildTables(rootData, rootName, keys){
  const idKeys   = (keys && keys.idKeys   && keys.idKeys.length)   ? keys.idKeys   : DEFAULT_ID_KEYS;
  const nameKeys = (keys && keys.nameKeys && keys.nameKeys.length) ? keys.nameKeys : DEFAULT_NAME_KEYS;
  const tables={}, order=[]; let seq=0;
  const ensure=n=>{ if(!tables[n]){tables[n]={name:n, rows:[]}; order.push(n);} return tables[n]; };
  function walk(arr, tableName, ancestors){
    const t=ensure(tableName);
    arr.forEach((item,idx)=>{
      if(item===null || typeof item!=="object" || Array.isArray(item)){
        t.rows.push({__uid:seq++, __anc:ancestors.slice(), __id:idx, __name:String(item), __raw:item, cells:{value:item}, links:{}});
        return;
      }
      const id=getId(item,idx,idKeys), name=getName(item,idx,nameKeys,idKeys);
      const row={__uid:seq++, __anc:ancestors.slice(), __id:id, __name:name, __raw:item, cells:{}, links:{}};
      for(const [k,v] of Object.entries(item)){
        if(isObjArray(v)){
          row.links[k]=v.length;
          walk(v.filter(x=>x && typeof x==="object" && !Array.isArray(x)), k, ancestors.concat([{table:tableName,id,name}]));
        } else if(Array.isArray(v)) row.cells[k]=v.join(", ");
        else if(v && typeof v==="object") row.cells[k]=JSON.stringify(v);
        else row.cells[k]=v;
      }
      t.rows.push(row);
    });
  }
  const arr = Array.isArray(rootData) ? rootData
            : (rootData && typeof rootData==="object") ? [rootData] : [rootData];
  walk(arr, rootName, []);
  return {tables, order};
}

function computeColumns(table){
  const anc=[],sca=[],lnk=[], sa=new Set(),ss=new Set(),sl=new Set();
  for(const r of table.rows){
    for(const a of r.__anc) if(!sa.has(a.table)){sa.add(a.table); anc.push(a.table);}
    for(const k of Object.keys(r.cells)) if(!ss.has(k)){ss.add(k); sca.push(k);}
    for(const k of Object.keys(r.links)) if(!sl.has(k)){sl.add(k); lnk.push(k);}
  }
  return {anc, sca, lnk};
}
const ancGet = (table)=> (r)=>{ const a=r.__anc.find(x=>x.table===table); return a?a.name:null; };
const ancIdGet = (table)=> (r)=>{ const a=r.__anc.find(x=>x.table===table); return a?a.id:null; };

function distinctOptions(rows, getVal){
  const set=new Map();
  rows.forEach(r=>{ const v=getVal(r); if(v==null||v==='') return; if(!set.has(v)) set.set(v,true); });

// A value counts as a date only if it's a string that clearly looks like one —
// bare numbers (e.g. a "founded" year) must NOT be misread as dates.
function isDateString(v){
  if(typeof v!=='string') return false;
  const s=v.trim();
  if(!s || /^[+-]?\d+(\.\d+)?$/.test(s)) return false;
  // YYYY-MM-DD or YYYY/MM/DD, optional time / timezone
  if(/^\d{4}[-/]\d{1,2}[-/]\d{1,2}([ T]\d{1,2}:\d{2}(:\d{2})?(\.\d+)?\s*(Z|[+-]\d{2}:?\d{2})?)?$/.test(s)) return true;
  // month names etc. ("Jan 5, 2020", "5 January 2020 14:00")
  if(/[A-Za-z]/.test(s) && /\d/.test(s) && !isNaN(Date.parse(s))) return true;
  return false;
}
const hasTimePart = v => typeof v==='string' && /\d{1,2}:\d{2}/.test(v);

// A text column with at most this many distinct values becomes a faceted
// multiSelect (option list + faceted search); above it, plain text. Configurable.
const DEFAULT_FACET_MAX = 32;
// Max height (px) a table cell's content may take before it's clipped. Configurable.
const DEFAULT_CELL_HEIGHT = 72;
function detectVariant(rows, getVal, facetMax=DEFAULT_FACET_MAX){
  const vals=rows.map(getVal).filter(v=>v!=null&&v!=='');
  if(!vals.length) return 'text';
  if(vals.every(v=>typeof v==='boolean')) return 'boolean';
  if(vals.every(isDateString)) return 'date';
  const allNum = vals.every(v=>typeof v==='number' || (typeof v==='string' && v.trim()!=='' && !isNaN(Number(v))));
  if(allNum) return 'number';
  const distinct=new Set(vals.map(String));
  return distinct.size<=facetMax ? 'multiSelect' : 'text';
}

function Popover({trigger, children, align='start', contentClass, className}){
  const [open,setOpen]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{
    if(!open) return;
    const down=e=>{ if(ref.current && !ref.current.contains(e.target)) setOpen(false); };
    const key=e=>{ if(e.key==='Escape') setOpen(false); };
    document.addEventListener('mousedown',down); document.addEventListener('keydown',key);
    return ()=>{ document.removeEventListener('mousedown',down); document.removeEventListener('keydown',key); };
  },[open]);
  const trig=React.cloneElement(trigger,{ 'data-state':open?'open':'closed', onClick:(e)=>{ trigger.props.onClick&&trigger.props.onClick(e); setOpen(o=>!o); } });
  return <span className={cn('relative inline-flex', className)} ref={ref}>
    {trig}
    {open && <div className={cn('absolute top-full z-50 mt-1.5 rounded-md border bg-popover text-popover-foreground shadow-md', align==='end'?'right-0':'left-0', contentClass)}>
      {typeof children==='function'?children(()=>setOpen(false)):children}
    </div>}
  </span>;
}

/* =====================================================================
 * advanced filter evaluation
 * ===================================================================== */
// Operator sets + exact labels mirror tablecn's dataTableConfig (src/config/data-table.ts).
const OPERATORS={
  text:[['iLike','Contains'],['notILike','Does not contain'],['eq','Is'],['ne','Is not'],['isEmpty','Is empty'],['isNotEmpty','Is not empty']],
  number:[['eq','Is'],['ne','Is not'],['lt','Is less than'],['lte','Is less than or equal to'],['gt','Is greater than'],['gte','Is greater than or equal to'],['isBetween','Is between'],['isEmpty','Is empty'],['isNotEmpty','Is not empty']],
  date:[['eq','Is'],['ne','Is not'],['lt','Is before'],['gt','Is after'],['lte','Is on or before'],['gte','Is on or after'],['isBetween','Is between'],['isEmpty','Is empty'],['isNotEmpty','Is not empty']],
  boolean:[['eq','Is'],['ne','Is not']],
  select:[['eq','Is'],['ne','Is not'],['isEmpty','Is empty'],['isNotEmpty','Is not empty']],
  multiSelect:[['inArray','Has any of'],['notInArray','Has none of'],['isEmpty','Is empty'],['isNotEmpty','Is not empty']],
};
const defaultOp = v => ({text:'iLike', number:'eq', date:'eq', boolean:'eq', select:'eq', multiSelect:'inArray'}[v] || 'iLike');

function evalCond(orig, c, metaById){
  const m=metaById[c.fieldId]; if(!m) return true;
  const v=m.getValue(orig);
  const empty = v==null || v==='';
  if(c.operator==='isEmpty') return empty;
  if(c.operator==='isNotEmpty') return !empty;
  if(m.variant==='number'){
    if(c.operator==='isBetween'){
      const [a,b]=Array.isArray(c.value)?c.value:[];
      const lo=(a===''||a==null||isNaN(Number(a)))?null:Number(a);
      const hi=(b===''||b==null||isNaN(Number(b)))?null:Number(b);
      if(lo==null&&hi==null) return true;
      const x=Number(v);
      if(lo!=null&&x<lo) return false;
      if(hi!=null&&x>hi) return false;
      return true;
    }
    if(c.value===''||c.value==null||isNaN(Number(c.value))) return true;
    const a=Number(v), b=Number(c.value);
    switch(c.operator){ case 'eq':return a===b; case 'ne':return a!==b; case 'lt':return a<b; case 'lte':return a<=b; case 'gt':return a>b; case 'gte':return a>=b; default:return true; }
  }
  if(m.variant==='date'){
    if(c.operator==='isBetween'){
      const [a,b]=Array.isArray(c.value)?c.value:[];
      if(!a&&!b) return true;
      const rt=Date.parse(v); if(isNaN(rt)) return false;
      if(a){ const ds=Date.parse(a+'T00:00:00'); if(!isNaN(ds)&&rt<ds) return false; }
      if(b){ const de=Date.parse(b+'T00:00:00')+86400000; if(!isNaN(de)&&rt>=de) return false; }
      return true;
    }
    if(c.value===''||c.value==null) return true;
    const rt=Date.parse(v); if(isNaN(rt)) return false;
    // filter picker is day-granular; compare row timestamp against that calendar day's window
    const ds=Date.parse(c.value+'T00:00:00'); if(isNaN(ds)) return true;
    const de=ds+86400000;
    switch(c.operator){
      case 'eq':  return rt>=ds && rt<de;
      case 'ne':  return !(rt>=ds && rt<de);
      case 'lt':  return rt<ds;
      case 'lte': return rt<de;
      case 'gt':  return rt>=de;
      case 'gte': return rt>=ds;
      default: return true;
    }
  }
  if(m.variant==='boolean'){
    if(c.value===''||c.value==null) return true;
    const bv=String(v)===String(c.value);
    return c.operator==='ne'? !bv : bv;
  }
  if(m.variant==='multiSelect'){
    const sel=Array.isArray(c.value)?c.value:(c.value?[c.value]:[]);
    if(!sel.length) return true;
    const sv=String(v);
    const inSel=sel.map(String).includes(sv);
    return c.operator==='notInArray' ? !inSel : inSel;
  }
  if(c.value===''||c.value==null) return true;
  const sv=String(v==null?'':v).toLowerCase(), fv=String(c.value).toLowerCase();
  switch(c.operator){ case 'iLike':return sv.includes(fv); case 'notILike':return !sv.includes(fv); case 'eq':return sv===fv; case 'ne':return sv!==fv; default:return true; }
}
function evalAdvanced(orig, adv, metaById){
  if(!adv.conditions.length) return true;
  const res=adv.conditions.map(c=>evalCond(orig,c,metaById));
  return adv.joinOperator==='or' ? res.some(Boolean) : res.every(Boolean);
}

function ColumnHeader({column, title}){
  if(!column.getCanSort()) return <span className="text-xs font-medium text-muted-foreground">{title}</span>;
  const sorted=column.getIsSorted();
  return <Popover trigger={
    <Button variant="ghost" size="sm" className="-ml-2 h-8 data-[state=open]:bg-accent">
      <span>{title}</span>
      {sorted==='desc'? <ArrowDown className="h-3.5 w-3.5"/> : sorted==='asc'? <ArrowUp className="h-3.5 w-3.5"/> : <ChevronsUpDown className="h-3.5 w-3.5 text-muted-foreground"/>}
    </Button>} contentClass="w-40 p-1">
    {(close)=> <>
      <MenuItem icon={<ArrowUp/>} label="Asc"  active={sorted==='asc'}  onClick={()=>{column.toggleSorting(false); close();}}/>
      <MenuItem icon={<ArrowDown/>} label="Desc" active={sorted==='desc'} onClick={()=>{column.toggleSorting(true); close();}}/>
      {column.getCanHide() && <><Sep/><MenuItem icon={<EyeOff/>} label="Hide" onClick={()=>{column.toggleVisibility(false); close();}}/></>}

}

/* =====================================================================
 * faceted filter (Airtable-style)
 * ===================================================================== */
function FacetedFilter({column, title, options}){
  const [q,setQ]=useState('');
  const selected=new Set(column.getFilterValue()||[]);
  const counts=column.getFacetedUniqueValues();
  const shown=options.filter(o=>o.label.toLowerCase().includes(q.toLowerCase()));
  return <Popover trigger={
    <Button variant="outline" size="sm" className="h-8 border-dashed">
      <CirclePlus className="h-3.5 w-3.5"/> {title}
      {selected.size>0 && <><Sep vertical/>
        <div className="hidden gap-1 lg:flex">
          {selected.size>2
            ? <Badge variant="secondary" className="rounded-sm px-1 font-normal">{selected.size} selected</Badge>
            : options.filter(o=>selected.has(o.value)).map(o=><Badge key={String(o.value)} variant="secondary" className="rounded-sm px-1 font-normal">{o.label}</Badge>)}
        </div>
        <Badge variant="secondary" className="rounded-sm px-1 font-normal lg:hidden">{selected.size}</Badge></>}
    </Button>} contentClass="w-56 p-0">
    {()=> <div>
      <div className="flex items-center gap-2 border-b px-2">
        <Search className="h-3.5 w-3.5 opacity-50"/>
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder={title} className="h-9 w-full bg-transparent text-sm outline-none"/>
      </div>
      <div className="max-h-64 overflow-auto p-1">
        {shown.length===0 && <div className="py-6 text-center text-sm text-muted-foreground">No results.</div>}
        {shown.map(o=>{ const on=selected.has(o.value);
          return <button key={String(o.value)} onClick={()=>{ const ns=new Set(selected); on?ns.delete(o.value):ns.add(o.value); column.setFilterValue(ns.size?[...ns]:undefined); }}
            className="flex w-full items-center gap-2 rounded-sm px-2 py-1.5 text-sm hover:bg-accent hover:text-accent-foreground">
            <Tick on={on}/>
            <span className="flex-1 truncate text-left">{o.label}</span>
            <span className="font-mono text-xs text-muted-foreground">{counts.get(o.value)||0}</span>
          </button>; })}
      </div>
      {selected.size>0 && <><Sep/><button onClick={()=>column.setFilterValue(undefined)} className="w-full px-2 py-2 text-center text-sm hover:bg-accent">Clear filters</button></>}
    </div>}
  </Popover>;
}

/* =====================================================================
 * numeric-range & date-range toolbar filters (columnFilter based)
 * ===================================================================== */
const multiFilterFn = (row,cid,val)=> !val||!val.length|| val.some(x=>x===row.getValue(cid));
const numberRangeFn = (row,cid,val)=>{ if(!val) return true; const v=Number(row.getValue(cid)); const [a,b]=val; if(a!=null&&a!==''&&v<Number(a)) return false; if(b!=null&&b!==''&&v>Number(b)) return false; return true; };
const dateRangeFn = (row,cid,val)=>{ if(!val) return true; const t=Date.parse(row.getValue(cid)); if(isNaN(t)) return false; const [f,to]=val; if(f){ const fs=Date.parse(f+'T00:00:00'); if(!isNaN(fs)&&t<fs) return false; } if(to){ const te=Date.parse(to+'T00:00:00')+86400000; if(!isNaN(te)&&t>=te) return false; } return true; };
// global search — matches the query against every column: scalar cells, ancestor
// names/ids, and the row's own id/name.
const globalRowFilter = (row, _cid, val)=>{
  const q=String(val??'').trim().toLowerCase();
  if(!q) return true;
  const r=row.original, hay=[];
  if(r.cells) for(const k in r.cells){ const v=r.cells[k]; if(v!=null&&v!=='') hay.push(String(v)); }
  if(r.__anc) for(const a of r.__anc){ if(a.name!=null) hay.push(String(a.name)); if(a.id!=null) hay.push(String(a.id)); }
  if(r.__name!=null) hay.push(String(r.__name));
  if(r.__id!=null) hay.push(String(r.__id));
  return hay.some(s=>s.toLowerCase().includes(q));
};

function RangeFilter({column, title}){
  const val=column.getFilterValue()||[];
  const active = (val[0]!=null&&val[0]!=='')||(val[1]!=null&&val[1]!=='');
  const set=(a,b)=> column.setFilterValue(((a===''||a==null)&&(b===''||b==null))?undefined:[a,b]);
  return <Popover contentClass="w-60 p-3" trigger={
    <Button variant="outline" size="sm" className="h-8 border-dashed"><CirclePlus className="h-3.5 w-3.5"/> {title}
      {active && <><Sep vertical/><Badge variant="secondary" className="rounded-sm px-1 font-normal">{val[0]!==''&&val[0]!=null?val[0]:'−∞'} – {val[1]!==''&&val[1]!=null?val[1]:'∞'}</Badge></>}
    </Button>}>
    {()=> <div className="space-y-2">
      <div className="text-xs font-medium text-muted-foreground">{title}</div>
      <div className="flex items-center gap-2">
        <Input type="number" placeholder="min" value={val[0]??''} onChange={e=>set(e.target.value, val[1]??'')} className="h-8"/>
        <span className="text-muted-foreground">–</span>
        <Input type="number" placeholder="max" value={val[1]??''} onChange={e=>set(val[0]??'', e.target.value)} className="h-8"/>
      </div>
      {active && <button onClick={()=>column.setFilterValue(undefined)} className="w-full rounded-sm px-2 py-1.5 text-center text-sm hover:bg-accent">Clear</button>}
    </div>}
  </Popover>;
}
function DateRangeFilter({column, title}){
  const val=column.getFilterValue()||[];
  const active = (val[0]||val[1]);
  const set=(a,b)=> column.setFilterValue((!a&&!b)?undefined:[a,b]);
  return <Popover contentClass="w-64 p-3" trigger={
    <Button variant="outline" size="sm" className="h-8 border-dashed"><CalendarIcon className="h-3.5 w-3.5"/> {title}
      {active && <><Sep vertical/><Badge variant="secondary" className="rounded-sm px-1 font-normal">{val[0]||'…'} → {val[1]||'…'}</Badge></>}
    </Button>}>
    {()=> <div className="space-y-2">
      <div className="text-xs font-medium text-muted-foreground">{title}</div>
      <label className="flex items-center justify-between gap-2 text-sm text-muted-foreground">From<Input type="date" value={val[0]||''} onChange={e=>set(e.target.value, val[1]||'')} className="h-8 w-40"/></label>
      <label className="flex items-center justify-between gap-2 text-sm text-muted-foreground">To<Input type="date" value={val[1]||''} onChange={e=>set(val[0]||'', e.target.value)} className="h-8 w-40"/></label>
      {active && <button onClick={()=>column.setFilterValue(undefined)} className="w-full rounded-sm px-2 py-1.5 text-center text-sm hover:bg-accent">Clear</button>}
    </div>}
  </Popover>;
}

// Shared multi-select choice menu. A search box appears only once the option
// list gets long (many unique values); short lists are just clickable choices.
function ChoiceList({options, selected, onToggle, searchAfter=10}){
  const [q,setQ]=useState('');
  const showSearch = options.length>searchAfter;
  const shown = q ? options.filter(o=>o.label.toLowerCase().includes(q.toLowerCase())) : options;
  return <div className="w-56">
    {showSearch &&
      <div className="flex items-center gap-2 border-b px-2">
        <Search className="h-3.5 w-3.5 opacity-50"/>
        <input autoFocus value={q} onChange={e=>setQ(e.target.value)} placeholder="Search options..." className="h-9 w-full bg-transparent text-sm outline-none"/>
      </div>}
    <div className="max-h-64 overflow-auto p-1">
      {shown.length===0 && <div className="py-6 text-center text-sm text-muted-foreground">{options.length? 'No matches.' : 'No options.'}</div>}
      {shown.map(o=>{ const on=selected.has(o.value);
        return <button key={String(o.value)} onClick={()=>onToggle(o.value)}
          className="flex w-full items-center gap-2 rounded-sm px-2 py-1.5 text-sm hover:bg-accent hover:text-accent-foreground">
          <span className="flex-1 truncate text-left">{o.label}</span>
          <Check className={cn('h-3.5 w-3.5', on?'opacity-100':'opacity-0')}/>
        </button>; })}
    </div>
  </div>;
}
function ValueEditor({meta, cond, onChange}){
  if(cond.operator==='isEmpty'||cond.operator==='isNotEmpty') return <div className="h-8 flex-1"/>;
  if(cond.operator==='isBetween'){
    const arr=Array.isArray(cond.value)?cond.value:['',''];
    const type=meta.variant==='date'?'date':'number';
    return <div className="flex flex-1 items-center gap-1.5">
      <Input type={type} value={arr[0]??''} onChange={e=>onChange({...cond, value:[e.target.value, arr[1]??'']})} className="h-8 flex-1"/>
      <span className="text-muted-foreground">–</span>
      <Input type={type} value={arr[1]??''} onChange={e=>onChange({...cond, value:[arr[0]??'', e.target.value]})} className="h-8 flex-1"/>
    </div>;
  }
  if(meta.variant==='boolean')
    return <NSelect value={cond.value==null?'':String(cond.value)} onChange={e=>onChange({...cond, value:e.target.value})} className="h-8 flex-1"><option value="">—</option><option value="true">True</option><option value="false">False</option></NSelect>;
  if(meta.variant==='number')
    return <Input type="number" value={cond.value} onChange={e=>onChange({...cond, value:e.target.value})} className="h-8 flex-1" placeholder="value"/>;
  if(meta.variant==='date')
    return <Input type="date" value={cond.value||''} onChange={e=>onChange({...cond, value:e.target.value})} className="h-8 flex-1"/>;
  if(meta.variant==='multiSelect'){
    const sel=new Set(Array.isArray(cond.value)?cond.value:[]);
    const vLabel=valueLabel(meta, cond);
    return <Popover className="flex-1" contentClass="p-0" trigger={
      <button className="flex h-8 w-full items-center justify-between gap-1 rounded-md border border-input bg-background px-2 text-sm shadow-sm hover:bg-accent data-[state=open]:bg-accent">
        <span className="truncate">{vLabel || <span className="text-muted-foreground">Select…</span>}</span>
        <ChevronDown className="h-4 w-4 shrink-0 opacity-50"/>
      </button>}>
      {()=> <ChoiceList options={meta.options||[]} selected={sel}
        onToggle={val=>{ const ns=new Set(sel); ns.has(val)?ns.delete(val):ns.add(val); onChange({...cond, value:[...ns]}); }}/>}
    </Popover>;
  }
  return <Input type="text" value={cond.value} onChange={e=>onChange({...cond, value:e.target.value})} className="h-8 flex-1" placeholder="value"/>;
}
function FilterRow({index, cond, metas, metaById, join, onJoin, onChange, onRemove}){
  const meta=metaById[cond.fieldId]||metas[0];
  const ops=OPERATORS[meta.variant]||OPERATORS.text;
  return <div className="flex items-center gap-1.5">
    {index===0
      ? <span className="w-14 shrink-0 px-1 text-sm text-muted-foreground">Where</span>
      : index===1
        ? <NSelect value={join} onChange={e=>onJoin(e.target.value)} className="w-14 shrink-0"><option value="and">and</option><option value="or">or</option></NSelect>
        : <span className="w-14 shrink-0 px-1 text-center text-sm text-muted-foreground">{join}</span>}
    <NSelect value={cond.fieldId} onChange={e=>{ const nm=metaById[e.target.value]; onChange({...cond, fieldId:e.target.value, operator:defaultOp(nm.variant), value: nm.variant==='multiSelect'?[]:''}); }} className="w-28 shrink-0">
      {metas.map(m=><option key={m.id} value={m.id}>{m.label}</option>)}
    </NSelect>
    <NSelect value={cond.operator} onChange={e=>onChange({...cond, operator:e.target.value})} className="w-32 shrink-0">
      {ops.map(([v,l])=><option key={v} value={v}>{l}</option>)}

}
function FilterList({metas, metaById, value, onChange}){
  const add=()=>{ const m=metas[0]; onChange({...value, conditions:[...value.conditions, {id:uid(), fieldId:m.id, operator:defaultOp(m.variant), value: m.variant==='multiSelect'?[]:''}]}); };
  return <Popover trigger={
    <Button variant="outline" size="sm" className="h-8">
      <ListFilter className="h-3.5 w-3.5"/> Filter
      {value.conditions.length>0 && <Badge variant="secondary" className="ml-0.5 rounded-sm px-1 font-normal">{value.conditions.length}</Badge>}
    </Button>} contentClass="w-[30rem] p-3">
    {()=> <div className="space-y-2">
      <div>
        <div className="text-sm font-medium">{value.conditions.length? 'Filters' : 'No filters applied'}</div>
        <p className="text-xs text-muted-foreground">{value.conditions.length? 'Modify filters to refine your rows.' : 'Add filters to refine your rows.'}</p>
      </div>
      <div className="space-y-1.5">
        {value.conditions.map((c,i)=>
          <FilterRow key={c.id} index={i} cond={c} metas={metas} metaById={metaById}
            join={value.joinOperator} onJoin={j=>onChange({...value, joinOperator:j})}
            onChange={nc=>onChange({...value, conditions:value.conditions.map(x=>x.id===c.id?nc:x)})}
            onRemove={()=>onChange({...value, conditions:value.conditions.filter(x=>x.id!==c.id)})}/>)}
      </div>
      <div className="flex items-center gap-2 pt-1">
        <Button size="sm" variant="outline" onClick={add}><Plus className="h-3.5 w-3.5"/> Add filter</Button>
        {value.conditions.length>0 && <Button size="sm" variant="outline" onClick={()=>onChange({joinOperator:'and', conditions:[]})}>Reset filters</Button>}
      </div>
    </div>}
  </Popover>;
}

/* =====================================================================
 * advanced-filter value label helper
 * ===================================================================== */
function valueLabel(meta, cond){
  if(cond.operator==='isEmpty') return 'empty';
  if(cond.operator==='isNotEmpty') return 'not empty';
  if(cond.operator==='isBetween'){
    const arr=Array.isArray(cond.value)?cond.value:[];
    const a=arr[0]??'', b=arr[1]??'';
    return (a===''&&b==='') ? '' : `${a||'…'} – ${b||'…'}`;
  }
  if(meta.variant==='multiSelect'){
    const arr=Array.isArray(cond.value)?cond.value:[];
    if(!arr.length) return '';
    const labels=arr.map(v=>{ const o=(meta.options||[]).find(x=>x.value===v); return o?o.label:String(v); });
    return labels.length>2 ? labels.length+' selected' : labels.join(', ');
  }
  return (cond.value===''||cond.value==null) ? '' : String(cond.value);
}
// tablecn feature-flags toggle: a single-select outline ToggleGroup with joined items.
function Segmented({value, onChange, options}){
  return <div className="inline-flex w-fit items-center">
    {options.map((o,i)=>{ const on=value===o.value; const first=i===0, last=i===options.length-1;
      return <button key={o.value} onClick={()=>onChange(on?null:o.value)} title={o.title}
        className={cn('inline-flex h-8 items-center gap-1.5 whitespace-nowrap border px-3 text-xs font-medium transition-colors',
          first?'rounded-l-md':'rounded-l-none', last?'rounded-r-md':'rounded-r-none', !first&&'border-l-0',
          on?'bg-accent/70 text-accent-foreground hover:bg-accent/90':'bg-background text-muted-foreground hover:bg-muted hover:text-foreground')}>
        {o.icon}{o.label}
      </button>; })}
  </div>;
}

/* =====================================================================
 * sort list (multi-sort)
 * ===================================================================== */
function SortList({fields, sorting, setSorting}){
  const used=new Set(sorting.map(s=>s.id));
  const firstFree=fields.find(f=>!used.has(f.id));
  const add=()=>{ if(firstFree) setSorting([...sorting, {id:firstFree.id, desc:false}]); };
  return <Popover trigger={
    <Button variant="outline" size="sm" className="h-8">
      <ArrowUpDown className="h-3.5 w-3.5"/> Sort
      {sorting.length>0 && <Badge variant="secondary" className="ml-0.5 rounded-sm px-1 font-normal">{sorting.length}</Badge>}
    </Button>} contentClass="w-80 p-3">
    {()=> <div className="space-y-2">
      <div className="text-sm font-medium">{sorting.length? 'Sort by' : 'No sorting applied'}</div>
      <div className="space-y-1.5">
        {sorting.map((s,i)=>
          <div key={s.id+i} className="flex items-center gap-1.5">
            <NSelect value={s.id} onChange={e=>setSorting(sorting.map((x,j)=>j===i?{...x,id:e.target.value}:x))} className="flex-1">
              {fields.filter(f=>f.id===s.id || !used.has(f.id)).map(f=><option key={f.id} value={f.id}>{f.label}</option>)}
            </NSelect>
            <NSelect value={s.desc?'desc':'asc'} onChange={e=>setSorting(sorting.map((x,j)=>j===i?{...x,desc:e.target.value==='desc'}:x))} className="w-24">
              <option value="asc">Asc</option><option value="desc">Desc</option>
            </NSelect>
            <Button variant="ghost" size="iconSm" className="text-muted-foreground" onClick={()=>setSorting(sorting.filter((_,j)=>j!==i))}><Trash2 className="h-3.5 w-3.5"/></Button>
          </div>)}
      </div>
      <div className="flex items-center gap-2 pt-1">
        {firstFree && <Button size="sm" variant="outline" onClick={add}><Plus className="h-3.5 w-3.5"/> Add sort</Button>}
        {sorting.length>0 && <Button size="sm" variant="outline" onClick={()=>setSorting([])}>Reset sorting</Button>}
      </div>
    </div>}
  </Popover>;
}

/* =====================================================================
 * per-row actions (ellipsis dropdown)
 * ===================================================================== */
function RowActions({row, mt, onDrill}){
  const linkKeys=Object.keys(row.links).filter(k=>row.links[k]>0);
  const copy=()=>{ try{ navigator.clipboard.writeText(JSON.stringify(row.__raw,null,2)); }catch(e){} };
  const download=()=>{ const b=new Blob([JSON.stringify(row.__raw,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download=(String(row.__name||'row')).replace(/[^\w.-]+/g,'_')+'.json'; a.click(); URL.revokeObjectURL(a.href); };
  return <div className="flex justify-end">
    <Popover align="end" contentClass="w-48 p-1" trigger={
      <Button variant="ghost" size="iconSm" className="h-8 w-8 text-muted-foreground data-[state=open]:bg-accent"><Ellipsis className="h-4 w-4"/></Button>}>
      {(close)=> <>
        {linkKeys.map(k=><MenuItem key={k} icon={<CornerDownRight/>} label={`Open ${k} (${row.links[k]})`} onClick={()=>{ onDrill(k, mt.name, row.__id, row.__name); close(); }}/>)}
        {linkKeys.length>0 && <Sep/>}
        <MenuItem icon={<Copy/>} label="Copy JSON" onClick={()=>{ copy(); close(); }}/>
        <MenuItem icon={<Download/>} label="Download JSON" onClick={()=>{ download(); close(); }}/>

}

/* =====================================================================
 * columns builder
 * ===================================================================== */
function buildColumnModel(mt, onDrill, facetMax=DEFAULT_FACET_MAX, onParent){
  const {anc, sca, lnk}=computeColumns(mt);
  const columns=[]; const metas=[]; const sortFields=[]; const facetCols=[]; const rangeCols=[]; const dateCols=[]; const hiddenIds={};
  let primaryText=null;

  columns.push({
    id:'select', enableSorting:false, enableHiding:false, size:28,
    header:({table})=> <Checkbox checked={table.getIsAllPageRowsSelected()} indeterminate={table.getIsSomePageRowsSelected() && !table.getIsAllPageRowsSelected()} onChange={v=>table.toggleAllPageRowsSelected(v)}/>,
    cell:({row})=> <Checkbox checked={row.getIsSelected()} onChange={v=>row.toggleSelected(v)}/>,
  });

  // hidden column keyed on the row's own id — lets us filter a table to a single
  // row (used when clicking a parent name to view just that parent).
  columns.push({
    id:'__self_id', accessorFn:(r)=>r.__id, enableHiding:false, enableSorting:false,
    filterFn:(row,id,val)=> String(row.getValue(id))===String(val),
  });
  hiddenIds['__self_id']=false;

  anc.forEach(t=>{
    const nameId='anc_name__'+t, idId='anc_id__'+t;
    const getName=ancGet(t), getIdV=ancIdGet(t);
    const options=distinctOptions(mt.rows, getName);
    columns.push({
      id:nameId, accessorFn:getName, meta:{label:t, variant:'multiSelect', options, getValue:getName},
      header:({column})=> <ColumnHeader column={column} title={t}/>,
      cell:({row, getValue})=>{ const v=getValue(); if(!v) return <span className="text-muted-foreground">—</span>;
        const pid=getIdV(row.original);
        return onParent
          ? <button className="font-medium text-primary underline decoration-primary/40 underline-offset-2 hover:decoration-primary" title={`View ${t} “${v}”`} onClick={()=>onParent(t, pid, String(v))}>{v}</button>
          : <span className="font-medium">{v}</span>; },
      filterFn:(row,id,val)=> !val||!val.length|| val.some(x=>x===row.getValue(id)),
    });
    metas.push({id:nameId, label:t, variant:'multiSelect', options, getValue:getName});
    sortFields.push({id:nameId, label:t});
    facetCols.push({id:nameId, label:t, options});
    // hidden id column, used only for the drill (parent) filter
    columns.push({
      id:idId, accessorFn:getIdV, enableHiding:true, meta:{label:t+' id', variant:'text', getValue:getIdV},
      header:({column})=> <ColumnHeader column={column} title={t+' id'}/>,
      cell:({getValue})=> <span className="font-mono text-xs text-muted-foreground">{String(getValue()??'')}</span>,
      filterFn:(row,id,val)=> String(row.getValue(id))===String(val),
    });
    hiddenIds[idId]=false;
  });

  sca.forEach(k=>{
    const id='sca__'+k;
    const getV=(r)=>r.cells[k];
    const variant=detectVariant(mt.rows, getV, facetMax);
    const options = (variant==='multiSelect') ? distinctOptions(mt.rows, getV) : undefined;
    const dateHasTime = variant==='date' && mt.rows.some(r=>hasTimePart(getV(r)));
    const isPrimary = variant==='text' && !primaryText;
    if(isPrimary) primaryText={id, label:k};
    columns.push({
      id, accessorFn:getV, meta:{label:k, variant, options, getValue:getV},
      header:({column})=> <ColumnHeader column={column} title={k}/>,
      cell:({row, getValue})=>{ const v=getValue();
        if(v==null||v==='') return <span className="text-muted-foreground">—</span>;
        // the cell that holds this row's name key opens the detail modal
        if(onParent && String(v)===String(row.original.__name))
          return <button type="button" onClick={()=>onParent(mt.name, row.original.__id, row.original.__name)}
            className="block max-w-[520px] break-words text-left font-medium text-primary underline decoration-primary/40 underline-offset-2 hover:decoration-primary">{String(v)}</button>;
        if(variant==='date'){ const d=new Date(v); if(isNaN(d)) return <span>{String(v)}</span>;
          const txt=d.toLocaleDateString(undefined,{year:'numeric',month:'short',day:'numeric'}) + (dateHasTime? ', '+d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'}):'' );
          return <span className="flex items-center gap-1.5 whitespace-nowrap text-muted-foreground"><CalendarIcon className="h-3.5 w-3.5"/>{txt}</span>; }
        if(variant==='multiSelect') return <span className="block max-w-[520px] break-words">{String(v)}</span>;
        if(typeof v==='number') return <span className="font-mono tabular-nums">{v}</span>;
        if(typeof v==='boolean') return <Badge variant="secondary" className="rounded-sm font-normal">{String(v)}</Badge>;
        return <span className="block max-w-[520px] break-words">{String(v)}</span>;
      },
      filterFn: variant==='multiSelect' ? multiFilterFn : variant==='number' ? numberRangeFn : variant==='date' ? dateRangeFn : 'includesString',
      enableColumnFilter:true,
    });
    metas.push({id, label:k, variant, options, getValue:getV});
    sortFields.push({id, label:k});
    if(variant==='multiSelect') facetCols.push({id, label:k, options});
    else if(variant==='number') rangeCols.push({id, label:k});
    else if(variant==='date') dateCols.push({id, label:k});
  });

  lnk.forEach(k=>{
    const id='lnk__'+k;
    columns.push({
      id, accessorFn:(r)=>r.links[k]||0, enableColumnFilter:false, meta:{label:k},
      header:({column})=> <ColumnHeader column={column} title={k}/>,
      cell:({row})=>{ const n=row.original.links[k]||0;
        if(!n) return <span className="text-muted-foreground/60">—</span>;
        return <Button variant="outline" size="xs" className="h-7 gap-1.5" onClick={()=>onDrill(k, mt.name, row.original.__id, row.original.__name)}>
          <CornerDownRight className="h-3 w-3"/> View <Badge className="h-4 rounded-sm px-1 text-[10px] leading-none">{n}</Badge>
        </Button>; },
    });
    sortFields.push({id, label:k});
  });

  columns.push({
    id:'actions', enableSorting:false, enableHiding:false, size:44,
    header:()=> null,
    cell:({row})=> <RowActions row={row.original} mt={mt} onDrill={onDrill}/>,
  });

  const metaById={}; metas.forEach(m=>metaById[m.id]=m);
  // cap inline quick-filters shown in the toolbar to keep it tidy
  return {columns, metas, metaById, sortFields,
    facetCols:facetCols.slice(0,3), rangeCols:rangeCols.slice(0,2), dateCols:dateCols.slice(0,2),
    primaryText, hiddenIds};
}

/* =====================================================================
 * row detail modal — full parent tree + every field as a key/value table
 * ===================================================================== */
function DetailModal({detail, getRow, onClose}){
  useEffect(()=>{
    const key=e=>{ if(e.key==='Escape') onClose(); };
    document.addEventListener('keydown',key);
    return ()=>document.removeEventListener('keydown',key);
  },[]);
  if(!detail) return null;
  const fmt=(v)=>{
    if(v==null||v==='') return <span className="text-muted-foreground">—</span>;
    if(Array.isArray(v)){
      if(v.some(x=>x&&typeof x==='object'&&!Array.isArray(x))) return <Badge variant="secondary" className="rounded-sm font-normal">{v.length} item{v.length===1?'':'s'}</Badge>;
      return <span className="break-words">{v.join(', ')}</span>;
    }
    if(typeof v==='object') return <pre className="whitespace-pre-wrap break-words font-mono text-xs">{JSON.stringify(v,null,2)}</pre>;
    if(typeof v==='boolean') return <Badge variant="secondary" className="rounded-sm font-normal">{String(v)}</Badge>;
    return <span className="break-words">{String(v)}</span>;
  };
  // Build the chain childmost → up the tree: the clicked entry first, then each
  // ancestor (immediate parent … root), each resolved to its full row of values.
  const chain=[{table:detail.table, row:detail.row}];
  const anc=detail.row.__anc||[];
  for(let i=anc.length-1;i>=0;i--){ const a=anc[i]; chain.push({table:a.table, row:getRow?getRow(a.table,a.id):null, fallback:a}); }
  const levelLabel=(i)=> i===0?'this entry' : i===1?'parent' : i===2?'grandparent' : (i+' levels up');
  return <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
    <div className="absolute inset-0 bg-black/50" onClick={onClose}/>
    <div className="relative z-10 flex max-h-[85vh] w-full max-w-2xl flex-col rounded-lg border bg-card text-card-foreground shadow-lg">
      <div className="flex items-start justify-between gap-2 border-b px-4 py-3">
        <div className="min-w-0">
          <div className="truncate text-sm font-semibold">{String(detail.row.__name||'Entry')}</div>
          <div className="text-xs text-muted-foreground">{detail.table?detail.table+' · ':''}{chain.length>1?chain.length+' entries in tree':'1 entry'}</div>
        </div>
        <div className="flex shrink-0 items-center gap-1">
          <Button variant="ghost" size="iconSm" title="Copy JSON" onClick={()=>{ try{navigator.clipboard.writeText(JSON.stringify(detail.row.__raw,null,2));}catch(e){} }}><Copy className="h-4 w-4"/></Button>
          <Button variant="ghost" size="iconSm" title="Close" onClick={onClose}><X className="h-4 w-4"/></Button>
        </div>
      </div>
      <div className="min-h-0 flex-1 overflow-auto">
        {chain.map((e,idx)=>{
          const r=e.row, raw=r?r.__raw:null;
          const entries = (raw && typeof raw==='object' && !Array.isArray(raw)) ? Object.entries(raw) : (r?[['value', raw]]:[]);
          const name=r?String(r.__name):String(e.fallback&&e.fallback.name!=null?e.fallback.name:'');
          const id=r?String(r.__id):String(e.fallback&&e.fallback.id!=null?e.fallback.id:'');
          return <div key={idx} className="border-b last:border-0">
            <div className="sticky top-0 z-10 flex items-center gap-2 border-b bg-muted/60 px-4 py-2 backdrop-blur">
              <Badge variant="secondary" className="rounded-sm font-normal">{e.table}</Badge>
              <span className="truncate text-sm font-semibold">{name}</span>
              {id!=='' && <span className="font-mono text-[10px] text-muted-foreground">#{id}</span>}
              <Badge variant={idx===0?'default':'outline'} className="ml-auto shrink-0 rounded-sm text-[10px] font-normal">{levelLabel(idx)}</Badge>
            </div>
            {entries.length>0
              ? <table className="w-full text-sm"><tbody>
                  {entries.map(([k,v])=> <tr key={k} className="border-b align-top last:border-0">
                    <td className="w-44 px-4 py-2 font-medium text-muted-foreground">{k}</td>
                    <td className="px-4 py-2">{fmt(v)}</td>
                  </tr>)}
                </tbody></table>
              : <div className="px-4 py-3 text-sm text-muted-foreground">Details unavailable.</div>}
          </div>;
        })}
      </div>
    </div>
  </div>;
}

/* =====================================================================
 * DataTable
 * ===================================================================== */
function DataTable({mt, frame, onDrill, onParent, getRow, filterMode, setFilterMode, facetMax, maxCellHeight}){
  // clicking a parent/grandparent name opens its detail modal (falls back to
  // navigation if the row can't be found). Routed through a ref so the memoized
  // column model always calls the latest handler.
  const openEntryRef=useRef();
  const model=useMemo(()=>buildColumnModel(mt, onDrill, facetMax, (t,id,name)=>openEntryRef.current&&openEntryRef.current(t,id,name)), [mt, facetMax]);
  const [sorting,setSorting]=useState([]);
  const [columnFilters,setColumnFilters]=useState(
    frame.filters.map(f=>({id: f.self ? '__self_id' : 'anc_id__'+f.ancestorTable, value:f.id})));
  const [columnVisibility,setColumnVisibility]=useState(model.hiddenIds);
  const [rowSelection,setRowSelection]=useState({});
  const [pagination,setPagination]=useState(()=>{
    let ps=30; try{ const n=parseInt(localStorage.getItem('jtd-pageSize'),10); if(n>0) ps=n; }catch(e){}
    return {pageIndex:0, pageSize:ps};
  });
  useEffect(()=>{ try{ localStorage.setItem('jtd-pageSize', String(pagination.pageSize)); }catch(e){} },[pagination.pageSize]);
  const [advanced,setAdvanced]=useState({joinOperator:'and', conditions:[]});
  const [globalFilter,setGlobalFilter]=useState('');
  const [detail,setDetail]=useState(null); // {row, table}
  openEntryRef.current=(table,id,name)=>{ const r=getRow&&getRow(table,id); if(r) setDetail({row:r, table}); else if(onParent) onParent(table,id,name); };

  const data=useMemo(()=> mt.rows.filter(r=>evalAdvanced(r, advanced, model.metaById)), [mt, advanced, model]);

  const table=useReactTable({
    data, columns:model.columns,
    state:{sorting, columnFilters, columnVisibility, rowSelection, pagination, globalFilter},
    getRowId:(r)=>String(r.__uid),
    globalFilterFn: globalRowFilter, getColumnCanGlobalFilter: ()=>true,
    onSortingChange:setSorting, onColumnFiltersChange:setColumnFilters,
    onColumnVisibilityChange:setColumnVisibility, onRowSelectionChange:setRowSelection,
    onPaginationChange:setPagination, onGlobalFilterChange:setGlobalFilter,
    getCoreRowModel:getCoreRowModel(), getFilteredRowModel:getFilteredRowModel(),
    getSortedRowModel:getSortedRowModel(), getPaginationRowModel:getPaginationRowModel(),
    getFacetedRowModel:getFacetedRowModel(), getFacetedUniqueValues:getFacetedUniqueValues(),
  });

  const parentChips = columnFilters
    .filter(f=>f.id==='__self_id' || f.id.startsWith('anc_id__'))
    .map(f=>{
      if(f.id==='__self_id'){ const fr=frame.filters.find(x=>x.self); return {id:f.id, table:mt.name, value:f.value, name:fr?fr.name:String(f.value)}; }
      const t=f.id.slice('anc_id__'.length); const fr=frame.filters.find(x=>x.ancestorTable===t); return {id:f.id, table:t, value:f.value, name:fr?fr.name:String(f.value)}; });

  const quickFiltered = columnFilters.length>0 || advanced.conditions.length>0 || !!globalFilter;
  const selectedCount=Object.keys(rowSelection).length;

  const clearAll=()=>{ setColumnFilters([]); setAdvanced({joinOperator:'and', conditions:[]}); setGlobalFilter(''); };

  const exportSelected=()=>{
    const rows=table.getSelectedRowModel().rows.map(r=>r.original.__raw);
    const blob=new Blob([JSON.stringify(rows,null,2)],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=mt.name+'-selected.json'; a.click(); URL.revokeObjectURL(a.href);
  };

  const cols=table.getVisibleLeafColumns();

  return <div className="flex min-h-0 flex-1 flex-col gap-3">
    {/* advanced-filter toggle — its own row above the toolbar (tablecn) */}
    <div className="w-fit overflow-x-auto p-0.5">
      <Segmented value={filterMode} onChange={setFilterMode} options={[
        {value:'advanced', label:'Advanced filters', icon:<FileSpreadsheet className="h-3.5 w-3.5"/>, title:'Airtable like advanced filters for filtering rows.'},
      ]}/>
    </div>

    {/* toolbar — contents depend on whether advanced filtering is on */}
    <div className="flex w-full items-start justify-between gap-2">
      <div className="flex flex-1 flex-wrap items-center gap-2">
        {filterMode
          ? <>
              <SortList fields={model.sortFields} sorting={sorting} setSorting={setSorting}/>
              <FilterList metas={model.metas} metaById={model.metaById} value={advanced} onChange={setAdvanced}/>
            </>
          : <>
              <Input placeholder="Search all columns…"
                value={globalFilter}
                onChange={e=>setGlobalFilter(e.target.value)}
                className="h-8 w-40 lg:w-56"/>
              {model.facetCols.map(fc=>{ const col=table.getColumn(fc.id); return col? <FacetedFilter key={fc.id} column={col} title={fc.label} options={fc.options}/> : null; })}
              {model.rangeCols.map(rc=>{ const col=table.getColumn(rc.id); return col? <RangeFilter key={rc.id} column={col} title={rc.label}/> : null; })}
              {model.dateCols.map(dc=>{ const col=table.getColumn(dc.id); return col? <DateRangeFilter key={dc.id} column={col} title={dc.label}/> : null; })}
              {quickFiltered && <Button variant="ghost" size="sm" className="h-8" onClick={clearAll}><X className="h-3.5 w-3.5"/> Reset</Button>}
            </>}
      </div>
      <div className="flex items-center gap-2">
        {!filterMode && <SortList fields={model.sortFields} sorting={sorting} setSorting={setSorting}/>}
        <ViewOptions table={table}/>
      </div>
    </div>

    {/* pre-applied parent filter chips */}
    {parentChips.length>0 &&
      <div className="flex flex-wrap items-center gap-2">
        {parentChips.map(c=>
          <Badge key={c.id} variant="secondary" className="gap-1.5 rounded-md py-1 pl-2.5 pr-1 text-xs font-normal">
            <span className="text-muted-foreground">{c.table}.id =</span> <b className="font-semibold">{String(c.value)}</b>
            <span className="text-muted-foreground">({c.name})</span>
            <button className="rounded-sm p-0.5 hover:text-destructive" title="Show all (remove filter)" onClick={()=>setColumnFilters(prev=>prev.filter(x=>x.id!==c.id))}><X className="h-3 w-3"/></button>
          </Badge>)}
        <span className="text-xs text-muted-foreground">Pre-filtered to this parent — clear to see all entries grouped.</span>
      </div>}

    {/* table */}
    <div className="min-h-0 flex-1 overflow-auto rounded-md border">
      <table className="w-full caption-bottom text-sm">
        <thead className="sticky top-0 z-10 bg-background [&_tr]:border-b">
          {table.getHeaderGroups().map(hg=>
            <tr key={hg.id} className="border-b">
              {hg.headers.map(h=>
                <th key={h.id} className="h-10 px-3 text-left align-middle font-medium text-muted-foreground whitespace-nowrap">
                  {h.isPlaceholder?null:flexRender(h.column.columnDef.header, h.getContext())}
                </th>)}
            </tr>)}
        </thead>
        <tbody>
          {table.getRowModel().rows.length===0 &&
            <tr><td colSpan={cols.length} className="h-32 text-center text-muted-foreground">No results.</td></tr>}
          {table.getRowModel().rows.map(row=>
            <tr key={row.id} data-state={row.getIsSelected()?'selected':undefined}
              className="border-b transition-colors hover:bg-muted/50 data-[state=selected]:bg-muted">
              {row.getVisibleCells().map(cell=>
                <td key={cell.id} className="px-3 py-2 align-top">
                  <div className="overflow-auto" style={maxCellHeight?{maxHeight:maxCellHeight}:undefined}>{flexRender(cell.column.columnDef.cell, cell.getContext())}</div>
                </td>)}
            </tr>)}
        </tbody>
      </table>
    </div>

    {/* pagination */}
    <div className="flex flex-wrap items-center justify-between gap-3 px-1 text-sm">
      <div className="text-muted-foreground">
        {selectedCount} of {table.getFilteredRowModel().rows.length} row(s) selected.
      </div>
      <div className="flex flex-wrap items-center gap-4">
        <div className="flex items-center gap-2">
          <span className="text-muted-foreground">Rows per page</span>
          <NSelect value={pagination.pageSize} onChange={e=>table.setPageSize(Number(e.target.value))} className="w-16">
            {[10,20,30,40,50].map(n=><option key={n} value={n}>{n}</option>)}
          </NSelect>
        </div>
        <div className="text-muted-foreground">Page {table.getState().pagination.pageIndex+1} of {table.getPageCount()||1}</div>
        <div className="flex items-center gap-1">
          <Button variant="outline" size="iconSm" onClick={()=>table.setPageIndex(0)} disabled={!table.getCanPreviousPage()}><ChevronsLeft className="h-4 w-4"/></Button>
          <Button variant="outline" size="iconSm" onClick={()=>table.previousPage()} disabled={!table.getCanPreviousPage()}><ChevronLeft className="h-4 w-4"/></Button>
          <Button variant="outline" size="iconSm" onClick={()=>table.nextPage()} disabled={!table.getCanNextPage()}><ChevronRight className="h-4 w-4"/></Button>
          <Button variant="outline" size="iconSm" onClick={()=>table.setPageIndex(table.getPageCount()-1)} disabled={!table.getCanNextPage()}><ChevronsRight className="h-4 w-4"/></Button>
        </div>
      </div>
    </div>

    {/* selection action bar */}
    {selectedCount>0 &&
      <div className="pointer-events-none fixed inset-x-0 bottom-6 z-40 flex justify-center">
        <div className="pointer-events-auto flex items-center gap-2 rounded-lg border bg-card px-3 py-2 shadow-lg">
          <Badge variant="secondary" className="rounded-md">{selectedCount} selected</Badge>
          <Sep vertical/>
          <Button variant="outline" size="sm" className="h-8" onClick={exportSelected}><Download className="h-3.5 w-3.5"/> Export</Button>
          <Button variant="ghost" size="sm" className="h-8" onClick={()=>table.resetRowSelection()}><X className="h-3.5 w-3.5"/> Clear</Button>
        </div>
      </div>}

    {/* row detail modal */}
    <DetailModal detail={detail} getRow={getRow} onClose={()=>setDetail(null)}/>
  </div>;
}

/* =====================================================================
 * theme color picker — full Tailwind palette grid
 * ===================================================================== */
function ColorPicker({value, onChange}){
  return <Popover align="end" contentClass="w-64 p-3" trigger={
    <Button variant="outline" size="iconSm" title="Theme color">
      <span className="h-4 w-4 rounded-full border border-black/10" style={{background: value&&TW_COLORS[value]?TW_COLORS[value][5]:'hsl(var(--primary))'}}/>
    </Button>}>
    {(close)=> <div className="space-y-2">
      <div className="flex items-center justify-between">
        <span className="text-xs font-medium text-muted-foreground">Theme color</span>
        <button className="text-xs text-primary hover:underline" onClick={()=>{ onChange(null); close(); }}>Reset to default</button>
      </div>
      <div className="grid max-h-80 grid-cols-2 gap-1 overflow-auto pr-1">
        {Object.keys(TW_COLORS).map(name=>{ const on=value===name;
          return <button key={name} type="button" onClick={()=>{ onChange(name); close(); }}
            className={cn('flex items-center gap-2 rounded-md border px-2 py-1.5 text-sm capitalize hover:bg-accent hover:text-accent-foreground', on?'border-primary bg-accent':'border-transparent')}>
            <span className="h-4 w-4 shrink-0 rounded-full border border-black/10" style={{background:TW_COLORS[name][5]}}/>
            <span className="flex-1 truncate text-left">{name}</span>
            {on && <Check className="h-3.5 w-3.5 shrink-0"/>}
          </button>; })}
      </div>
    </div>}
  </Popover>;
}

function App(){
  const [text,setText]=useState(JSON.stringify(SAMPLE,null,2));
  const [model,setModel]=useState(null);
  const [error,setError]=useState('');
  const [stack,setStack]=useState([newFrame(ROOTNAME,[],ROOTNAME)]);
  const [showInput,setShowInput]=useState(true);
  const [idKeysText,setIdKeysText]=useState(DEFAULT_ID_KEYS.join(', '));
  const [nameKeysText,setNameKeysText]=useState(DEFAULT_NAME_KEYS.join(', '));
  const [facetMaxText,setFacetMaxText]=useState(String(DEFAULT_FACET_MAX));
  const [cellHeightText,setCellHeightText]=useState(String(DEFAULT_CELL_HEIGHT));
  const [filterMode,setFilterMode]=useState(null);
  const [dark,setDark]=useState(()=>{
    try{ const s=localStorage.getItem('jtd-dark'); if(s!=null) return s==='1'; }catch(e){}
    return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  });
  const [themeColor,setThemeColor]=useState(()=>{ try{ return localStorage.getItem('jtd-color')||null; }catch(e){ return null; } });

  useEffect(()=>{
    document.documentElement.classList.toggle('dark', dark);
    applyThemeColor(themeColor, dark);
    try{ localStorage.setItem('jtd-dark', dark?'1':'0'); themeColor? localStorage.setItem('jtd-color', themeColor) : localStorage.removeItem('jtd-color'); }catch(e){}
  },[dark, themeColor]);
  // live update: re-parse whenever the JSON (or key config) changes and refresh the
  // table as soon as the input is valid JSON. Invalid input keeps the last good view.
  useEffect(()=>{
    const timer=setTimeout(()=>{
      const raw=text.trim();
      if(!raw){ setError('Paste JSON to begin.'); return; }
      let data; try{ data=JSON.parse(raw); } catch(e){ setError('Invalid JSON: '+e.message); return; }
      const parseKeys=(s)=> s.split(/[,\s]+/).map(x=>x.trim()).filter(Boolean);
      const m=buildTables(data, ROOTNAME, {idKeys:parseKeys(idKeysText), nameKeys:parseKeys(nameKeysText)});
      if(!m.order.length){ setError('No tabular data found.'); return; }
      setError('');
      setModel(m); setStack([newFrame(ROOTNAME,[],ROOTNAME)]);
    }, 300);
    return ()=>clearTimeout(timer);
  },[text, idKeysText, nameKeysText]);
  const frame=stack[stack.length-1];
  const onDrill=(childKey,parentTable,parentId,parentName)=>
    setStack(s=>[...s, newFrame(childKey, [{ancestorTable:parentTable, id:parentId, name:parentName}], parentName+' › '+childKey)]);
  // clicking a parent name on a child row: jump to the parent table filtered to that one parent
  const onParent=(parentTable,parentId,parentName)=>
    setStack(s=>[...s, newFrame(parentTable, [{self:true, id:parentId, name:parentName}], parentName+' · '+parentTable)]);
  const switchTable=(name)=> setStack([newFrame(name,[],name)]);
  const crumbTo=(i)=> setStack(s=>s.slice(0,i+1));

  const frameKey = stack.map(f=>f.table+':'+f.filters.map(x=>x.id).join(',')).join('>');

  return <div className="flex h-full flex-col">
    {/* header */}
    <header className="flex flex-wrap items-center gap-3 border-b px-5 py-3">
      <h1 className="text-base font-semibold tracking-tight">JSON Thing</h1>
      <span className="hidden text-xs text-muted-foreground sm:inline">The best JSON explorer with support for nested data and complex filtering and sorting.</span>
      <div className="ml-auto flex items-center gap-2">
        <Button variant="outline" size="sm" className="h-8" onClick={()=>setShowInput(v=>!v)}>{showInput?'Hide input':'Show input'}</Button>
        <Button variant="outline" size="sm" className="h-8" onClick={()=>{ setText(JSON.stringify(SAMPLE,null,2)); }}>Load sample</Button>
        <ColorPicker value={themeColor} onChange={setThemeColor}/>
        <Button variant="ghost" size="iconSm" onClick={()=>setDark(d=>!d)} title="Toggle theme">{dark?<Sun className="h-4 w-4"/>:<Moon className="h-4 w-4"/>}</Button>
      </div>
    </header>

    <div className="flex min-h-0 flex-1">
      {/* input */}
      {showInput &&
        <aside className="flex w-[360px] shrink-0 flex-col border-r">
          <div className="flex items-center gap-2 border-b px-4 py-2.5">
            <span className="text-sm font-medium">JSON input</span>
            <span className="text-xs text-muted-foreground">array or object</span>
          </div>
          <textarea value={text} onChange={e=>setText(e.target.value)} spellCheck={false}
            className="m-3 flex-1 resize-none rounded-md border bg-background p-3 font-mono text-xs leading-5 outline-none focus-visible:ring-1 focus-visible:ring-ring"/>
          {/* special-key config — first matching key in each list is used */}
          <div className="space-y-2 border-t px-4 py-3">
            <div className="text-xs font-medium">Special keys <span className="font-normal text-muted-foreground">— first match found is used</span></div>
            <label className="block space-y-1">
              <span className="text-xs text-muted-foreground">ID keys</span>
              <Input value={idKeysText} onChange={e=>setIdKeysText(e.target.value)} placeholder="id" className="h-8 font-mono text-xs"/>
            </label>
            <label className="block space-y-1">
              <span className="text-xs text-muted-foreground">Name keys</span>
              <Input value={nameKeysText} onChange={e=>setNameKeysText(e.target.value)} placeholder="name" className="h-8 font-mono text-xs"/>
            </label>
            <p className="text-[11px] text-muted-foreground">Comma- or space-separated. Applied automatically.</p>
            <label className="block space-y-1 pt-1">
              <span className="text-xs text-muted-foreground">Max unique values to facet</span>
              <Input type="number" min="1" value={facetMaxText} onChange={e=>setFacetMaxText(e.target.value)} placeholder={String(DEFAULT_FACET_MAX)} className="h-8 font-mono text-xs"/>
            </label>
            <p className="text-[11px] text-muted-foreground">Columns with at most this many distinct values get faceted (multi-select) filtering. Applied instantly.</p>
            <label className="block space-y-1 pt-1">
              <span className="text-xs text-muted-foreground">Max cell height (px)</span>
              <Input type="number" min="0" value={cellHeightText} onChange={e=>setCellHeightText(e.target.value)} placeholder={String(DEFAULT_CELL_HEIGHT)} className="h-8 font-mono text-xs"/>
            </label>
            <p className="text-[11px] text-muted-foreground">Tall cell content is clipped to this height. 0 or blank = no limit. Applied instantly.</p>
          </div>
          {error && <div className="px-4 pb-3 text-xs text-destructive whitespace-pre-wrap">{error}</div>}
        </aside>}

      {/* main */}
      <main className="flex min-h-0 flex-1 flex-col gap-3 p-4">
        {model && <>
          {/* table tabs */}
          <div className="flex flex-wrap items-center gap-1.5">
            {model.order.map(name=>{ const active=name===frame.table && stack.length===1;
              return <button key={name} onClick={()=>switchTable(name)}
                className={cn('rounded-full border px-3 py-1 text-xs transition-colors', active?'border-primary bg-primary text-primary-foreground':'bg-secondary text-muted-foreground hover:text-foreground')}>
                {name} <span className="opacity-70">({model.tables[name].rows.length})</span>
              </button>; })}
          </div>
          {/* breadcrumbs */}
          {stack.length>1 &&
            <div className="flex flex-wrap items-center gap-1.5 text-sm text-muted-foreground">
              {stack.map((f,i)=> <React.Fragment key={i}>
                {i>0 && <ChevronRight className="h-3.5 w-3.5 opacity-50"/>}
                <button className="text-primary hover:underline" onClick={()=>crumbTo(i)}>
                  {i===0? f.table : (f.filters[0]? f.filters[0].name+' · '+f.table : f.table)}
                </button>
              </React.Fragment>)}
            </div>}

          <DataTable key={frameKey} mt={model.tables[frame.table]} frame={frame} onDrill={onDrill} onParent={onParent}
            getRow={(table,id)=> model.tables[table] ? model.tables[table].rows.find(r=>String(r.__id)===String(id)) : null}
            filterMode={filterMode} setFilterMode={setFilterMode} facetMax={Math.max(1, parseInt(facetMaxText,10)||DEFAULT_FACET_MAX)}
            maxCellHeight={(parseInt(cellHeightText,10)>0)?parseInt(cellHeightText,10):null}/>
        </>}
        {!model && <div className="grid flex-1 place-items-center text-sm text-muted-foreground">Paste valid JSON to see it, or click <b className="mx-1">Load sample</b>.</div>}
      </main>
    </div>
  </div>;
}

createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
